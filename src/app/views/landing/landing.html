<div class="landing-container">
  <section class="hero-section">
    <div class="hero-content">
      <h1 class="hero-title">🦖 DinoERP</h1>
      <p class="hero-subtitle">🦖🦖🦖</p>
      <div class="hero-buttons">
        <a pButton routerLink="/login" label="Login" icon="pi pi-sign-in" class="hero-btn"></a>
        <a pButton routerLink="/register" label="Registro" icon="pi pi-user-plus" class="hero-btn secondary"></a>
      </div>
    </div>
  </section>

  <section class="modules-section">
    <h2 class="section-title">Dino-Modulos</h2>
    
    <div class="modules-grid">
      <div *ngFor="let mod of modules" pAnimateOnScroll enterClass="animate-enter fade-in-10 slide-in-from-b-4 animate-duration-800" class="module-card">
        <p-card>
          <div class="module-emoji">{{ mod.emoji }}</div>
          <h3 class="module-name">{{ mod.name }}</h3>
          <p class="module-description">{{ mod.description }}</p>
          <button pButton label="Ver más" icon="pi pi-eye" class="module-btn"></button>
        </p-card>
      </div>
    </div>
  </section>


  <footer class="landing-footer">
    <p>&copy; DinoERP, el ERP más dinesco 🦖🦖🦖</p>
  </footer>
</div>
