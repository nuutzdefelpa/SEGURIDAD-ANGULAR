<div class="modal-background">
  <div class="modal-card">
    <h1>Login</h1>
    <form class="basic-form" (ngSubmit)="onSubmit()">
      <p-message *ngIf="loginError" severity="error" [text]="loginError"></p-message>
      <p *ngIf="successMessage" class="success">{{ successMessage }}</p>
      <label for="login-email">Email</label>
      <input id="login-email" pInputText type="email" [(ngModel)]="email" name="email" />
      <label for="login-password">Contraseña</label>
      <p-password inputId="login-password" [(ngModel)]="password" name="password" toggleMask="true"></p-password>
      <button pButton type="submit" label="Entrar"></button>
    </form>

    <p>Aquí va el login wuuu</p>

    <a pButton routerLink="/" class="p-button-text">Volver a Landing</a>
    <a pButton routerLink="/register" class="p-button-text">Ir a Register</a>
  </div>
</div>
